<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Spam Classifier</title>
    <style>
        body        { font-family: Arial, sans-serif; max-width: 600px; margin: 60px auto; padding: 0 20px; }
        h1          { color: #333; }
        textarea    { width: 100%; padding: 10px; font-size: 14px; border: 1px solid #ccc; border-radius: 4px; resize: vertical; }
        input[type=submit] { margin-top: 10px; padding: 10px 24px; background: #2d6cdf; color: white;
                             border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
        input[type=submit]:hover { background: #1a52b8; }
        .result     { margin-top: 24px; padding: 16px; border-radius: 6px; font-size: 18px; font-weight: bold; }
        .spam       { background: #fde8e8; color: #c0392b; border: 1px solid #e74c3c; }
        .ham        { background: #e8f8e8; color: #27ae60; border: 1px solid #2ecc71; }
        .error      { background: #fff3cd; color: #856404; border: 1px solid #ffc107; }
    </style>
</head>
<body>
    <h1>📧 Email Spam Classifier</h1>
    <p>Paste the email text below and click <strong>Classify</strong> to detect spam.</p>

    <form action="/predict" method="post">
        <textarea name="email_text" rows="10" placeholder="Paste email content here...">{{ input_text or '' }}</textarea><br>
        <input type="submit" value="Classify">
    </form>

    {% if result %}
        {% if 'SPAM' in result %}
            <div class="result spam">🚨 Result: {{ result }}</div>
        {% elif 'error' in result.lower() or 'please' in result.lower() %}
            <div class="result error">⚠️ {{ result }}</div>
        {% else %}
            <div class="result ham">✅ Result: {{ result }}</div>
        {% endif %}
    {% endif %}
</body>
</html>
